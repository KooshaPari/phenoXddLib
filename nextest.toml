# Cargo-nextest configuration for phenotype-xdd-lib

[profile.default]
timeout = { per_test = 180, per_item = 120 }
formatter = "pretty"
failure-output = "immediate"
show_skipped = true
fail-fast = false
retries = 1

[[profile.default.overrides]]
filter = "test(property::)"
retries = 3
timeout = { per_test = 300 }
