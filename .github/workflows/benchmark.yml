name: Benchmarks

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  benchmark:
    name: Rust Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-criterion
        run: cargo install cargo-criterion || true

      - name: Run benchmarks
        id: benchmark
        run: |
          mkdir -p benchmark-results

          # Run cargo bench and capture output
          cargo bench -- --noplot json 2>&1 | tee benchmark-results/raw.json || true

          # Create summary if raw output exists
          if [ -f benchmark-results/raw.json ]; then
            echo "Benchmarks completed. Results in benchmark-results/raw.json"
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: phenotype-xdd-lib-benchmark-results-${{ github.sha }}
          path: benchmark-results/
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Benchmark results available at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            })

  benchmark-regression:
    name: Compare with Main
    runs-on: ubuntu-latest
    needs: benchmark
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download current results
        uses: actions/download-artifact@v4
        with:
          name: phenotype-xdd-lib-benchmark-results-${{ github.sha }}
          path: current

      - name: Checkout main
        run: |
          git fetch origin main
          git stash
          git checkout origin/main

      - name: Run main benchmarks
        run: |
          mkdir -p main
          cargo bench -- --noplot json 2>&1 | tee main/raw.json || true

      - name: Compare results
        run: |
          echo "=== Benchmark Comparison ==="
          echo ""
          echo "Main branch results: main/raw.json"
          echo "Current branch results: current/raw.json"
          echo ""
          echo "To view detailed comparison, download both artifacts and compare the JSON outputs."
